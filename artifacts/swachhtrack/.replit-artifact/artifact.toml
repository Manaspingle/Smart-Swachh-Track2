kind = "web"
previewPath = "/"
title = "SwachhTrack – Smart Waste Management"
version = "1.0.0"
id = "artifacts/swachhtrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18194
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/swachhtrack run dev"

[services.env]
PORT = "18194"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/swachhtrack", "run", "build"]
publicDir = "artifacts/swachhtrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
